body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿明教大師臣天息災奉詔譯灌頂真言唵引曩莫舍吉野二合母曩曳引怛他誐哆野引囉賀二合帝三藐三沒䭾野誦此真言七遍以手於頭上灌頂及摩觸遍身然後息念志心作佛母般若波羅蜜多菩薩觀行想此菩薩三面三眼身真金色坐吉祥藏師子座座有千葉金蓮身有六臂右邊三臂第一臂執數珠第二臂執箭第三臂作施願相左邊三臂第一臂執經第二臂執弓第三臂執如意寶如是六臂種種莊嚴於其身上復放無數百千那由他俱胝光明遍滿一切世界復想一切如來及多羅菩薩等一切菩薩具足相好莊嚴其身以諸香花而親供養如是觀想已復念心真言唵引曩莫舍吉野二合母曩曳怛他引誐哆野引囉賀二合諦引三藐三沒䭾引野怛儞野二合他引唵引母儞引母儞摩賀引母儞引曳引娑嚩二合引賀次誦根本真言怛儞野二合他引唵惹曳引惹曳引鉢納摩二合引鼻阿嚩弭引阿嚩弭引娑囉娑羅尼地里地里囉引地里地囉引地里儞嚩哆引努波引羅儞沒度引哆引囉尼布囉野布囉野婆誐嚩底薩里嚩二合引舍引摩摩波里布囉野娑波里嚩囉寫薩里嚩二合引薩怛鑁二合左薩里嚩二合迦里摩二合引嚩囉拏儞尾輸䭾野尾輸䭾野沒䭾引地瑟姹二合引儞曩娑嚩二合引賀引誦此真言已復作觀行想彼佛母般若波羅蜜多菩薩右邊有釋迦世尊燃燈世尊無量壽世尊智決定世尊光明王世尊雷聲吼音世尊金花世尊散花世尊於菩薩左邊毘婆尸世尊羯俱忖那世尊迦諾迦牟尼世尊迦葉世尊寶手世尊於菩薩前面大遍照世尊寶生世尊阿彌陀世尊不空成就世尊阿閦世尊於菩薩後面最上蓮華世尊最上寶世尊喜吉祥世尊琉璃光世尊不思議吉祥世尊於菩薩前復有聖觀自在菩薩慈氏菩薩普賢菩薩妙吉祥菩薩歸命菩薩不思議吉祥聲菩薩金剛手菩薩無盡意菩薩辯積菩薩無邊辯菩薩虛空藏菩薩無垢稱菩薩自在行菩薩法生菩薩常啼菩薩月光菩薩法雲菩薩地藏菩薩寶藏菩薩寶幢菩薩尸棄菩薩香象菩薩金毘羅菩薩如是等一切菩薩摩訶薩遍滿佛剎復有顰眉明王等亦在菩薩前如是聖眾一一觀想已復想人間天上殊妙香花珍寶供具以用供養佛母般若波羅蜜多菩薩并諸眷屬一切菩薩作此觀已是人不久當成正覺
